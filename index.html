<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart To-Do System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h4>To-Do System</h4>
  <a onclick="showSection('dashboard')">Dashboard</a>
  <a onclick="showSection('tasks')">Tasks</a>
  <a onclick="showSection('calendar')">Calendar</a>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
  <h4>Dashboard</h4>
  <div class="card p-3 shadow-sm">
    <p id="stats"></p>
  </div>
</div>

<!-- TASKS -->
<div id="tasksSection">

<h4>Tasks</h4>

<div class="row g-2 mb-3">
  <input id="taskInput" class="form-control col" placeholder="Task">
  <input id="taskDate" type="date" class="form-control col">
  
  <div class="d-flex col">
    <input id="taskTime" type="time" class="form-control">
    <select id="ampm" class="form-select ms-1">
      <option>AM</option>
      <option>PM</option>
    </select>
  </div>

  <div class="d-flex col">
    <input id="taskHours" type="number" class="form-control" placeholder="Hours" min="0">
    <input id="taskMinutes" type="number" class="form-control ms-1" placeholder="Minutes" min="0" max="59">
  </div>

  <select id="priority" class="form-select col">
    <option value="low">Low</option>
    <option value="mid">Medium</option>
    <option value="high">High</option>
  </select>

  <button onclick="addTask()" class="btn btn-primary col">Add</button>
</div>

<div class="row">
  <div class="col-md-4"><h6>To Do</h6><div id="todo"></div></div>
  <div class="col-md-4"><h6>In Progress</h6><div id="progress"></div></div>
  <div class="col-md-4"><h6>Done</h6><div id="done"></div></div>
</div>

<h6 class="mt-3">⚠️ Pending Tasks</h6>
<div id="pending"></div>

</div>

<!-- CALENDAR -->
<div id="calendar" style="display:none">
  <h4>Calendar</h4>
  <input type="date" id="calendarDate" class="form-control mb-2">
  <div id="calendarTasks"></div>
</div>

</div>

<!-- ✅ FIXED SCRIPT POSITION -->
<script src="script.js"></script>

</body>
</html>
